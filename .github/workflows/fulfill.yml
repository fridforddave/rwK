name: surrender

on:
  push:

jobs:
  cage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        human: ["invisible", "score", "legal", "recently", "opening"]
        van: ["outcome", "remedy", "simplicity", "masterpiece"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar JG.jar
